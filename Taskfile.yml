version: "3"

vars:
  DOTNET: '{{if eq OS "windows"}}C:\Program Files\dotnet\dotnet.exe{{else}}dotnet{{end}}'
  PROJECT: App/App.csproj
  PUBLISH_DIR: publish

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build the project (Debug)
    cmds:
      - '"{{.DOTNET}}" build {{.PROJECT}} -c Debug'

  build:release:
    desc: Build the project (Release)
    cmds:
      - '"{{.DOTNET}}" build {{.PROJECT}} -c Release'

  run:
    desc: Run the app (Debug)
    cmds:
      - '"{{.DOTNET}}" run --project {{.PROJECT}} -c Debug'

  clean:
    desc: Clean build outputs
    cmds:
      - '"{{.DOTNET}}" clean {{.PROJECT}}'

  publish:
    desc: Publish a self-contained single-file exe to ./publish
    cmds:
      - '"{{.DOTNET}}" publish {{.PROJECT}}
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o {{.PUBLISH_DIR}}'

  restore:
    desc: Restore NuGet packages
    cmds:
      - '"{{.DOTNET}}" restore {{.PROJECT}}'

  # ── MSIX distribution ────────────────────────────────────────────────────────

  cert:
    desc: "Create & trust a self-signed code-signing cert (run once, as Administrator)"
    cmds:
      - powershell -ExecutionPolicy Bypass -File tools\cert.ps1

  assets:
    desc: Generate MSIX logo PNGs from the icon SVG
    cmds:
      - '"{{.DOTNET}}" run --project tools/IconGen -- --assets App/Assets'

  pack:
    desc: Publish and package as a signed MSIX (output -> dist/AuviWin.msix)
    cmds:
      - powershell -ExecutionPolicy Bypass -File tools\pack.ps1

  install:
    desc: Install the MSIX package on this machine
    deps: [pack]
    cmds:
      - powershell -ExecutionPolicy Bypass -Command "Add-AppxPackage -Path dist\AuviWin.msix"

  uninstall:
    desc: Uninstall the MSIX package
    cmds:
      - powershell -ExecutionPolicy Bypass -Command "Get-AppxPackage -Name AuviWin | Remove-AppxPackage"
